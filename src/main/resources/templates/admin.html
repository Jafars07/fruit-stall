	<!DOCTYPE html>
	<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1">
	
	    <title>Admin - Fruit Stall</title>
	
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
	    <link rel="stylesheet"
	          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	
	    <link rel="stylesheet" href="/css/admin.css">
	</head>
	
	<body>
	
	<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
	    <div class="container">
	
	        <a class="navbar-brand fw-bold" href="/">
	            🍎 Fruit Stall Admin
	        </a>
	
	        <button class="navbar-toggler"
	                data-bs-toggle="collapse"
	                data-bs-target="#navBar">
	
	            <span class="navbar-toggler-icon"></span>
	        </button>
	
	        <div class="collapse navbar-collapse" id="navBar">
	
	            <ul class="navbar-nav ms-auto">
	
	
	                <li class="nav-item">
	                    <a class="nav-link text-warning" href="/">
	                        Home
	                    </a>
	                </li>
	                
	                <li class="nav-item">
	                    <a class="nav-link" href="/products">
	                        Products
	                    </a>
	                </li>
	                
	                <li class="nav-item">
	    <a class="nav-link" href="/admin-orders">
	       View Orders
	    </a>
	</li>
	
	            </ul>
	
	        </div>
	    </div>
	</nav>
	
	
	<div class="container py-4">
	
	    <!-- DASHBOARD -->
	    <div class="row g-3 mb-4">
	
	        <div class="col-md-4">
	            <div class="dashboard-card">
	
	                <i class="bi bi-box-seam"></i>
	
	                <h4 id="totalProducts">0</h4>
	
	                <p>Total Products</p>
	
	            </div>
	        </div>
	
	        <div class="col-md-4">
	            <div class="dashboard-card success">
	
	                <i class="bi bi-check-circle"></i>
	
	                <h4 id="availableProducts">0</h4>
	
	                <p>Available</p>
	
	            </div>
	        </div>
	
	        <div class="col-md-4">
	            <div class="dashboard-card danger">
	
	                <i class="bi bi-x-circle"></i>
	
	                <h4 id="unavailableProducts">0</h4>
	
	                <p>Out Of Stock</p>
	
	            </div>
	        </div>
	
	    </div>
	
	
	    <!-- ADD PRODUCT -->
	    <div class="card shadow-sm border-0 mb-5">
	
	        <div class="card-body p-4">
	
	            <h3 class="text-center text-success fw-bold mb-4">
	                Add / Update Product
	            </h3>
	
	            <form id="productForm">
	
	                <div class="row">
	
	                    <div class="col-md-6 mb-3">
	
	                        <label class="form-label">
	                            Product Name
	                        </label>
	
	                        <input type="text"
	                               id="name"
	                               class="form-control"
	                               required>
	                    </div>
	
	                    <div class="col-md-6 mb-3">
	
	                        <label class="form-label">
	                            Price
	                        </label>
	
	                        <input type="number"
	                               id="price"
	                               class="form-control"
	                               required>
	                    </div>
	
	                    <div class="col-md-6 mb-3">
	
	                        <label class="form-label">
	                            Unit
	                        </label>
	
	                        <input type="text"
	                               id="unit"
	                               class="form-control"
	                               placeholder="kg / piece"
	                               required>
	                    </div>
	
	                    <div class="col-md-6 mb-3">
	
	                        <label class="form-label">
	                            Upload Image
	                        </label>
	
	                        <input type="file"
	                               id="imageFile"
	                               class="form-control"
	                               accept="image/*">
	                    </div>
	
	                    <div class="col-12 text-center mb-3">
	
	                        <img id="previewImage"
	     src="/images/no-image.png"
	     class="preview-img">
	
	                    </div>
	
	                    <div class="col-12 mb-3">
	
	                        <div class="form-check">
	
	                            <input type="checkbox"
	                                   id="available"
	                                   class="form-check-input"
	                                   checked>
	
	                            <label class="form-check-label">
	                                Available
	                            </label>
	
	                        </div>
	                    </div>
	
	                </div>
	
	                <button type="submit"
	                        id="saveBtn"
	                        class="btn btn-success w-100">
	
	                    Save Product
	
	                </button>
	
	            </form>
	
	            <p id="msg" class="text-center mt-3"></p>
	
	        </div>
	    </div>
	
	
	    <!-- PRODUCT TABLE -->
	    <div class="card border-0 shadow-sm">
	
	        <div class="card-body p-4">
	
	            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
	
	                <h3 class="fw-bold text-success m-0">
	                    All Products
	                </h3>
	
	                <input type="text"
	                       id="searchBox"
	                       class="form-control search-box"
	                       placeholder="Search product..."
	                       onkeyup="filterProducts()">
	
	            </div>
	
	
	            <div class="table-responsive">
	
	                <table class="table table-hover align-middle text-center">
	
	                    <thead class="table-success">
	
	                    <tr>
	
	                        <th>ID</th>
	                        <th>Image</th>
	                        <th>Name</th>
	                        <th>Price</th>
	                        <th>Unit</th>
	                        <th>Status</th>
	                        <th>Actions</th>
	
	                    </tr>
	
	                    </thead>
	
	                    <tbody id="productTable"></tbody>
	
	                </table>
	
	            </div>
	
	        </div>
	    </div>
	
	</div>
	
	<script src="/js/admin.js"></script>
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
	</body>
	</html>
