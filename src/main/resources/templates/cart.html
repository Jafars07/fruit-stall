<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/css/cart.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/products">🍎 Fruit Stall</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navBar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/products">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/cart">Cart</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/my-orders">My Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="#" onclick="logout()">Logout</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- 🛒 CART -->
<div class="container mt-4 cart-container">

    <h3 class="mb-3">My Cart</h3>

    <div id="cartItems"></div>

</div>

<!-- 🔥 FIXED FOOTER (RESPONSIVE) -->
<div class="cart-footer">

    <div class="footer-content">
        <h5>Total: ₹<span id="totalPrice">0</span></h5>

        <button class="btn btn-success checkout-btn" onclick="checkout()">
            Checkout
        </button>
    </div>

</div>
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg">
                Success
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>
        </div>
    </div>

</div>

<script src="/js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
