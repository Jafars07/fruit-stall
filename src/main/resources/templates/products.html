<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Products - Fruit Stall</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/products.css">
</head>

<body>

<!-- 🔥 NAVBAR (MATCHED WITH OTHER PAGES) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/products">🍎 Fruit Stall</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navBar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/products">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/cart">Cart</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/my-orders">My Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="#" onclick="logout()">Logout</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- 🔍 SEARCH BAR (NEW FEATURE - IMPORTANT) -->
<div class="container mt-4">
    <input type="text" id="searchBox" class="form-control"
           placeholder="Search fruits..."
           onkeyup="filterProducts()">
</div>

<!-- 🍎 PRODUCTS -->
<div class="container my-4">

    <h3 class="mb-3">Available Fruits</h3>

    <div class="row g-4" id="productList"></div>

</div>

<!-- 🔔 TOAST -->
<div class="toast-container-custom">

    <div id="liveToast" class="toast text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body text-center" id="toastMsg"></div>
        </div>
    </div>

</div>

<script src="/js/products.js"></script>
<!-- <script src="/js/cart.js"></script> -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
